name: Build and Release Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          # Use npm ci if package-lock is present, otherwise use npm install
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build the extension
        run: npm run build

      - name: Zip the extension
        run: |
          cd dist
          zip -r ../kontrak-extension.zip .
          cd ..

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.0.${{ github.run_number }}"
          gh release create "$TAG_NAME" kontrak-extension.zip \
            --title "Release $TAG_NAME" \
            --notes "Automated release triggered by push to main branch." \
            --latest
